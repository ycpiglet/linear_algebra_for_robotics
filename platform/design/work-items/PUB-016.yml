  exclusive_locks: [ci-control-plane, backlog-registry]
  generated: []
verification:
  source_contract:
    - 새 PR commit range와 main push range의 Actor trailer parser fixture
    - 한 push의 복수 merge와 dispatch 전체 range를 검사하는 Git graph fixture
    - 실패 merge 다음 정상 push도 cutline 갱신 전에는 계속 차단하는 fixture
    - untrusted PR code를 checkout·실행하지 않는 trusted-provenance workflow contract
    - dispatch PR 번호·head SHA·live PR label·test-merge 부모를 재검증하는 workflow contract
    - PR #14를 포함해 agent·editor·supervisor workflow 변경을 모두 거부하는 fixture
    - multiple merge-base로 control-plane path를 숨기지 못하고 latest-main sync는 허용하는 fixture
    - literal backslash-n과 본문 문자열만 있는 agent commit의 fail-closed test
    - make test와 make lint
  rendered_contract: []
  post_merge:
    - 유효한 agent trailer commit은 통과하고 의도적으로 잘못 만든 fixture는 차단됨
    - compliant canary의 exact test-merge SHA에 trusted-provenance success가 게시됨
    - ruleset에는 trusted-provenance를 아직 required로 추가하지 않고 PUB-017 hold를 기록함
rollback:
  triggers:
    - 사람 커밋이나 과거 허용 예외까지 차단함
    - merge queue·배치 merge의 정상 commit range를 해석하지 못함
  unit: merge_commit
  steps:
    - editorial을 freeze·drain하고 실패 range·event payload·ruleset 전체 JSON을 보존한다
    - trusted-provenance requirement만 일시 제거한 뒤 supervisor recovery PR에서 내용 revert와 cutline 전진을 함께 수행한다
    - Actor supervisor merge와 main push 성공 후 required context를 복원하고 canary를 재검증한다
  compatibility_preserved:
    - 기존 history와 공개 provenance evidence는 수정하지 않는다
definition_of_done:
  - Git trailer parser가 Actor 값 agent를 정확히 하나 인식해야 agent provenance로 판정한다
  - PR·main push·workflow_dispatch 모두 이벤트에 맞는 전체 새 commit range를 검사한다
  - main push는 first-parent의 모든 2-parent integration merge와 각 branch-only commit을 검사한다
  - main push는 trusted-through 이후 전체 범위를 매번 재검사해 실패 상태를 유지한다
  - trusted-provenance 상태는 base-side verifier가 test-merge SHA에 게시하고 PR head는 Git data로만 읽는다
  - 자동 batch PR은 live PR metadata와 exact head SHA를 대조한 repository_dispatch로 같은 상태를 게시한다
  - 외부 신뢰 결박 전에는 actor:supervisor 라벨도 control-plane 변경 권한으로 취급하지 않는다
  - literal escape·본문 유사 문자열·중복 상충 trailer fixture가 실패한다
  - PUB-002 완료 SHA를 trusted-through cutline으로 고정해 그 이전 예외만 역사로 보존한다
