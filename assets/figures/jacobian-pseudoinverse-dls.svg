<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 580" role="img" aria-labelledby="title desc">
  <title id="title">의사역행렬과 감쇠 최소제곱의 특이방향 관절속도 증폭 비교</title>
  <desc id="desc">가로축은 미터 매 라디안 단위의 최소 특이값 0부터 0.5, 세로축은 라디안 매 미터 단위의 관절속도 대 말단속도 이득 0부터 30인 그래프다. 붉은 실선인 의사역행렬 이득 1 나누기 시그마는 시그마가 0에 가까워질수록 그래프 위쪽으로 발산한다. 청록색 파선인 감쇠 최소제곱 이득은 람다 0.05미터 매 라디안일 때 시그마 0.05미터 매 라디안에서 10라디안 매 미터로 정점을 이루고 0에서는 0이 된다. 시그마 0.05 미만은 준특이 주의 구간으로 표시된다.</desc>
  <defs>
    <style>
      .ink{fill:#172033;font-family:'Noto Sans KR',sans-serif}.muted{fill:#5b6578;font-family:'Noto Sans KR',sans-serif}.grid{stroke:#d7dfeb;stroke-width:1}.axis{stroke:#5b6578;stroke-width:2}.pinv{stroke:#a92f49;stroke-width:5;fill:none}.dls{stroke:#087f78;stroke-width:5;stroke-dasharray:12 7;fill:none}.limit{stroke:#955000;stroke-width:3;stroke-dasharray:3 6}.zone{fill:#ffe8ed;opacity:.72}.dot{fill:#087f78}.callout{fill:#fff;stroke:#d7dfeb;stroke-width:2}
    </style>
  </defs>
  <rect width="1120" height="580" rx="24" fill="#fbfcfe"/>
  <text class="ink" x="38" y="45" font-size="26" font-weight="700">작은 특이값을 그대로 뒤집으면 폭주하고, 감쇠하면 추종과 안정성을 교환한다</text>
  <text class="muted" x="38" y="72" font-size="16">한 특이방향의 이득 비교: 의사역행렬 1/σ · DLS σ/(σ²+λ²), λ=0.05 m/rad</text>

  <g transform="translate(0 0)">
    <rect class="zone" x="110" y="125" width="90" height="330"/>
    <text class="ink" x="117" y="146" font-size="14" font-weight="700">준특이 주의</text>
    <line class="grid" x1="110" y1="455" x2="1010" y2="455"/><line class="grid" x1="110" y1="355" x2="1010" y2="355"/><line class="grid" x1="110" y1="255" x2="1010" y2="255"/><line class="grid" x1="110" y1="155" x2="1010" y2="155"/>
    <line class="grid" x1="200" y1="125" x2="200" y2="455"/><line class="grid" x1="290" y1="125" x2="290" y2="455"/><line class="grid" x1="470" y1="125" x2="470" y2="455"/><line class="grid" x1="650" y1="125" x2="650" y2="455"/><line class="grid" x1="830" y1="125" x2="830" y2="455"/><line class="grid" x1="1010" y1="125" x2="1010" y2="455"/>
    <line class="axis" x1="110" y1="455" x2="1028" y2="455"/><line class="axis" x1="110" y1="474" x2="110" y2="112"/>
    <line class="limit" x1="110" y1="255" x2="1010" y2="255"/><text class="ink" x="780" y="244" font-size="15" font-weight="700">예시 이득 기준 20 rad/m</text>

    <path class="pinv" d="M128 155 L146 155 L182 205 L200 255 L245 322 L290 355 L380 388 L470 405 L650 422 L830 430 L1010 435"/>
    <path class="dls" d="M110 455 L128 417 L146 386 L164 367 L182 357 L200 355 L245 363 L290 375 L380 395 L470 408 L650 423 L830 430 L1010 435"/>
    <circle class="dot" cx="200" cy="355" r="7"/><line x1="207" y1="350" x2="290" y2="307" stroke="#087f78" stroke-width="2"/>
    <rect class="callout" x="286" y="273" width="257" height="58" rx="12"/>
    <text class="ink" x="302" y="298" font-size="15" font-weight="700">DLS 최대 이득 = 1/(2λ) = 10 rad/m</text>
    <text class="muted" x="302" y="319" font-size="14">σ=λ=0.05 m/rad에서 정점</text>
    <text class="singular" x="151" y="179" font-size="15" font-weight="700" fill="#a92f49">1/σ → ∞</text>

    <text class="muted" x="79" y="461" font-size="14">0</text><text class="muted" x="72" y="361" font-size="14">10</text><text class="muted" x="72" y="261" font-size="14">20</text><text class="muted" x="72" y="161" font-size="14">30</text>
    <text class="muted" x="103" y="483" font-size="14">0</text><text class="muted" x="188" y="483" font-size="14">0.05</text><text class="muted" x="280" y="483" font-size="14">0.1</text><text class="muted" x="460" y="483" font-size="14">0.2</text><text class="muted" x="640" y="483" font-size="14">0.3</text><text class="muted" x="820" y="483" font-size="14">0.4</text><text class="muted" x="1000" y="483" font-size="14">0.5</text>
    <text class="ink" x="430" y="525" font-size="17" font-weight="700">최소 특이값 σ_min (m/rad)</text>
    <text class="ink" x="30" y="375" font-size="16" font-weight="700" transform="rotate(-90 30 375)">관절속도/말단속도 이득 (rad/m)</text>
    <line class="pinv" x1="686" y1="93" x2="733" y2="93"/><text class="ink" x="744" y="99" font-size="16" font-weight="700">의사역행렬</text>
    <line class="dls" x1="859" y1="93" x2="906" y2="93"/><text class="ink" x="917" y="99" font-size="16" font-weight="700">DLS</text>
  </g>
  <text class="muted" x="110" y="557" font-size="15">DLS가 억제한 방향은 정확히 추종되지 않는다. 감쇠는 ‘새 운동 방향’을 만들지 않는다.</text>
</svg>
