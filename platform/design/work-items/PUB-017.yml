verification:
  source_contract:
    - cutover-1은 editorial freeze·digest drain·열린 merge queue 0과 main·ruleset·credential snapshot 보존이며 완료 또는 rollback까지 무관한 PR merge·수동 deploy·digest dispatch를 금지함
    - cutover-2는 repository allow_auto_merge를 true·automatic head deletion을 false로 하고 Actions의 PR 생성·승인과 PR workflow write-token 전달을 false로 바꾸며 main ruleset을 임시 review_count 1·dismiss_stale true·require_last_push true·require_code_owner_review true·bypass 없음으로 강화한 뒤 trusted-provenance는 아직 required로 두지 않고 Actions를 끄는 것임
    - cutover-2의 immutable-ref ruleset은 active branch target·include exact refs/heads/agent/pr-*와 refs/heads/agent/pub-017-trust-transition·exclude 없음·update_allows_fetch_and_merge false인 update와 deletion 규칙만·bypass 없음이며 creation rule은 두지 않음
    - cutover-3은 Actions를 비활성화하고 App의 Workflows write를 bootstrap 동안만 켠 뒤 linear_algebra_for_robotics 하나에 설치하며 Workflows-capable token·private key·JWT를 agent runtime에 전달하지 않는 것임
    - cutover-4는 @ycpiglet이 통제하는 외부 broker가 exact main 1c2268cbf610ecabc60fef38d71808250315e630과 승인된 11-path tree를 대조한 뒤 단일 App commit·transition ref·PR만 생성하는 것임
    - cutover-4 직후 bootstrap App과 owner 모두 transition ref의 PATCH·force update·DELETE가 immutable ruleset에 거부됨을 확인함
    - cutover-5는 broker IAT를 즉시 revoke하고 App Workflows permission을 No access로 낮춘 뒤 설치 권한·모든 ref·workflow tree를 cutover 전 snapshot과 대조하고 나서만 Actions를 다시 켜며 새 steady-scope App IAT가 actor:agent label과 @ycpiglet review request를 추가해 checks를 재트리거하는 것임
    - cutover-6은 새 clean runtime에서 human-authority·private-key inventory와 사람 명의 API·SSH·push·review·ruleset 변경 부정 테스트가 모두 실패한 뒤 down-scoped App IAT만 전달하는 것임
    - transition은 CODEOWNERS·owner-approval-notify·verifier·운영 계약만 포함하고 App author와 다른 @ycpiglet이 exact head를 승인함
    - transition exact 11-path set은 CODEOWNERS·owner-review-signal·provenance·owner-approval-notify workflow·verifier·두 contract test·CLAUDE·design/editorial 운영 계약이며 다른 일반 파일도 끼울 수 없음
    - transition checks를 재실행하기 전에 App의 Workflows permission·기존 Workflows IAT가 모두 무효이고 snapshot 대비 expected transition ref와 그 exact approved workflow 외 추가 ref·workflow 변경이 없음을 확인함
    - 외부 broker는 GET /app의 ID 4353010·slug ycpiglet-robotics-math-agent, IAT GraphQL viewer.login과 transition PR user.login을 일치시켜 증거화하고 owner가 bot login을 AGENT_APP_BOT_LOGIN repository variable로 설정함
    - Actions-off PR 생성 시 actor label을 붙이지 않고 Actions 재활성화 뒤 exact live head를 재확인한 Workflows-none App IAT가 actor:agent label을 추가해 opened 때 누락된 required runs를 명시적으로 재트리거하며 최초 transition 알림은 아직 main에 없는 ntfy workflow 대신 GitHub review request를 사용함
    - Workflows No access App IAT의 server-side exact-head merge를 transition에서 확인하고 거부될 때만 agent 밖 broker가 최소 Workflows 창으로 exact head를 병합한 뒤 즉시 token·권한을 철회함
    - wrong-head approval 실패는 auto-merge 없는 draft fixture에서 먼저 확인하고 trusted-provenance를 required로 추가한 뒤에만 live auto-merge persistence canary를 실행함
    - steady-state ruleset은 review_count 0·dismiss_stale true·require_last_push false·require_code_owner_review true·review-thread resolution true·merge-only·bypass 빈 목록임
    - steady-state required checks는 source-contract·publication-build·trusted-provenance를 GitHub Actions integration ID 15368에 고정하고 trusted-provenance가 보호 경로의 exact-head owner approval을 검증함
    - 일반 경로 App PR은 사람 review 없이 live head에 auto-merge가 등록되고 세 required checks 성공 뒤 Actor trailer를 가진 merge commit으로 병합됨
    - bootstrap·editorial/batch 외 actor:agent PR은 head ref가 agent/pr-<40자리 live head SHA>와 정확히 같고 namespace ruleset상 create 뒤 update·force-push·delete가 모두 거부됨
    - 모든 actor:agent PR은 live base.repo·head.repo의 ID와 full_name이 target repository와 정확히 일치해 fork ref가 허용되지 않음
    - bootstrap·steady actor:agent PR user.login은 AGENT_APP_BOT_LOGIN과 정확히 일치하고 human·case variant·null은 실패하며 editorial/batch만 github-actions[bot] legacy 예외임
    - canonical protected path는 supervisor·editor·fork·editorial/batch에서 변경할 수 없고 exact bootstrap 또는 authenticated immutable App PR만 허용됨
    - immutable-ref canary는 bootstrap exact ref와 steady App exact ref의 POST 생성에는 성공하고 App과 owner의 이후 PATCH·force update·DELETE에는 실패하며 자동 병합은 branch 삭제 실패와 무관하게 성공함
    - immutable-ref cleanup은 IAT 발급을 멈춘 owner freeze에서 update rule은 유지하고 deletion rule만 잠시 제거해 exact closed/merged ref를 삭제한 뒤 rule·namespace audit을 복원함
    - CODEOWNERS fixture는 자체 파일·모든 .github/workflows 경로·다른 TRUSTED_GATE_PATHS를 오직 @ycpiglet에 match하고 같은 PR의 일반 경로 포함 여부와 무관하게 owner 승인을 요구함
    - 보호 경로 PR은 checks가 성공해도 @ycpiglet 승인 전 blocked이며 approval commit ID가 live head SHA와 일치함
    - 보호 경로는 live @ycpiglet APPROVED review의 commit_id가 live head와 다르면 trusted-provenance가 실패하고 새 head 알림과 재승인을 요구함
    - App은 PR queue를 직렬화하고 head drift·strict base advance에서 기존 auto-merge를 끄고 PR을 닫은 뒤 최신 main 단일 parent의 새 App commit/ref/PR을 만들며 update-branch·--admin·gh pr review를 사용하지 않음
    - steady Workflows-none App은 workflow 변경을 retry하지 않고 Actions-off 외부 exact-tree broker의 일회성 권한 창으로만 라우팅함
    - editorial/batch는 default-branch digest 전용 legacy exception이며 bootstrap reuse나 steady App one-shot/auto-merge controller 입력으로 사용하지 않음
    - owner-approval-notify는 trusted base 코드만 사용하고 contents read·pull-requests read 외 권한, PR head checkout, third-party action, cache, artifact가 없음
    - owner-review-signal은 pull_request_review submitted·dismissed에서 permissions 빈 맵·no-op만 실행하고 required가 아니며 base-side provenance workflow_run은 upstream conclusion·payload를 승인 증거로 쓰지 않고 live state를 재조회함
    - owner-approval-notify는 보호 경로만 분류하고 live open·non-draft·main PR·exact head뿐 아니라 AGENT_APP_BOT_LOGIN author·target base/head repository ID/name·immutable 또는 exact bootstrap head ref를 최초·파일 조회 뒤·전송 직전에 확인한 뒤 NTFY_TOPIC을 JSON body로 고정 https://ntfy.sh endpoint에 전달함
    - allimbot 메시지는 PR 번호·보호 이유·short head SHA·고정 조립한 GitHub URL만 담고 body·diff·commit message·secret을 담지 않으며 승인 기능을 제공하지 않음
    - allimbot 실패는 알림 job에 드러나지만 required context가 아니며 GitHub CODEOWNER review request가 독립 fallback으로 남음
    - App permission snapshot은 Metadata read·Contents write·Pull requests write·Actions read·Checks read·Commit statuses read·Issues·Variables·Workflows none과 단일 repository installation만 포함함
    - App active private-key fingerprint·creation-time inventory가 승인된 Windows 보관 key 목록과 정확히 일치하고 외부 broker만 IAT를 mint할 수 있음
    - clean runtime inventory는 GH_TOKEN·GITHUB_TOKEN·netrc·GIT_ASKPASS·credential.helper·url insteadOf·SSH_AUTH_SOCK·SSH key·connector/MCP·host mount·open secret FD·Docker socket 부재를 fail-closed로 확인함
    - broker는 private key·JWT를 반환하지 않고 IAT의 installation·repository_ids·permissions·expires_at positive attestation과 token 원문 없는 fingerprint만 제공함
    - App은 author·committer·signature를 위조하지 않은 Git Database commit과 Pulls API를 사용하고 Authorization 원문을 disk·URL·git config·log에 남기지 않음
    - 외부 REST evidence에서 expected App bot login의 commit·PR author와 @ycpiglet reviewer가 다르고 transition review commit ID가 exact head와 일치함
  rendered_contract: []
  post_merge:
    - transition 중 base-side 구 trusted-provenance failure는 informational이며 source-contract는 PR 버전 verifier를 검증함
    - transition 병합이 촉발한 publish-web·deploy-pages run과 gh-pages source-commit이 exact main SHA와 일치함
    - 일반 경로 canary가 사람 승인 0으로 자동 병합되고 세 required checks·Actor trailer·배포가 성공함
    - 보호 경로 canary가 allimbot 알림 뒤 @ycpiglet 승인 전 차단되고 승인 뒤 자동 병합됨
    - 보호 canary 승인 뒤 최종 diff가 같은 새 commit에서도 trusted-provenance가 기존 review commit_id를 거부하고 새 head 알림·재승인을 요구함
    - main advance canary는 old auto-merge·PR을 닫고 최신 main 단일 parent의 새 PR을 만들며 보호 변경이면 새 승인, 일반 변경이면 무승인으로 완료함
    - App의 Administration·Workflows·status write와 사람 명의 API·SSH·review 시도가 실패하고 repository allow_auto_merge가 true임
    - ruleset 전후 JSON·history와 App permission·installation·IAT scope·비밀 원문 없는 credential inventory를 evidence로 보존함
rollback:
  triggers:
    - agent runtime이 App bot authority와 @ycpiglet review·admin authority를 동시에 행사할 수 있음
    - 일반 경로가 사람 승인 없이는 병합되지 않거나 보호 경로가 @ycpiglet 승인 없이 병합됨
    - stale approval이 새 protected head에 남거나 allimbot이 승인 authority를 보유함
    - agent/pr-* ref를 생성 뒤 update·force-push·delete할 수 있거나 head suffix가 live SHA와 다름
    - App permission 또는 installation/token scope가 allowlist보다 넓거나 bootstrap Workflows write가 남아 있음
    - test-merge status와 기존 PR head checks가 함께 ruleset을 만족하지 못함
  unit: cutover
  steps:
    - auto-merge 신규 등록과 App IAT 발급을 중지하고 editorial freeze를 유지한다
    - trusted-provenance required context만 동시 변경 방지 역패치로 제거하고 기존 source-contract·publication-build·merge-only 규칙은 유지한다
    - steady-state review_count 0이 보호 경로를 놓치면 전역 review_count 1을 임시 복원해 fail-closed한다
    - App compromise 때 외부 owner가 installation suspend 또는 uninstall·활성 IAT revoke·private key 회전을 수행한다
    - 알림 결함만 있으면 CODEOWNER 보호를 유지한 채 owner-approval-notify를 별도 승인 PR로 역패치하고 GitHub review request를 사용한다
    - App 불능이면 외부 broker의 recovery App commit을 @ycpiglet이 승인하고, 그것도 불가능하면 Actions를 끄고 ruleset history를 보존한 채 CODEOWNER requirement를 exact emergency PR 동안만 해제하는 break-glass 후 즉시 복원한다
    - 실패 PR·head·test-merge SHA·ruleset·permission·token scope·알림 run을 보존한다
  compatibility_preserved:
    - 콘텐츠·URL·기존 Git history와 기존 두 required check는 바꾸지 않는다
definition_of_done:
  - agent automation과 @ycpiglet supervisor가 서로 다른 GitHub authority를 사용한다
  - clean runtime에는 down-scoped 1시간 이하 App IAT만 있고 private key·JWT signer·사람 OAuth·PAT·gh keyring·credential helper·SSH key·connector·App user token이 없다
  - App은 linear_algebra_for_robotics 하나에만 설치되고 steady-state 권한에 Administration·Workflows·Issues·Variables·status write가 없다
  - App의 active private key가 승인된 Windows 보관 fingerprint 목록과 일치하고 unknown key·unknown token minter가 없다
  - AGENT_APP_BOT_LOGIN은 설치 IAT viewer.login과 App-authored transition PR author로 교차 확인되고 App에는 variables write 권한이 없다
  - 최초 transition exact head만 별도 @ycpiglet 승인으로 병합되며 CODEOWNERS 병합 뒤에는 보호 경로에만 같은 승인이 필요하다
  - repository allow_auto_merge가 활성이고 일반 경로는 strict required checks 뒤 사람 개입 없이 auto-merge된다
  - App ref ruleset은 bootstrap exact ref와 agent/pr-*의 creation만 허용하고 update·delete·bypass가 없으며 verifier가 steady full head SHA suffix를 강제한다
  - 보호 경로는 allimbot 원격 알림과 GitHub review request를 보내고 @ycpiglet의 exact-head 승인 뒤 auto-merge된다
  - 승인 뒤 protected head가 바뀌면 trusted-provenance가 기존 review commit_id를 거부하고 새 알림·재승인을 요구한다
  - allimbot은 링크 알림만 제공하고 GitHub token·review·merge·admin authority를 보유하지 않는다
  - CODEOWNERS가 자체 파일·모든 workflow·TRUSTED_GATE_PATHS의 verifier·editorial runtime·schema 경로를 @ycpiglet에 결박한다
  - trusted-provenance status source가 GitHub Actions integration ID 15368에 고정되고 기존 두 required checks와 함께 required임
  - transition·일반·보호·stale-review canary와 emergency 역패치가 모두 검증된다
  - credential·notification evidence에는 identifier·scope·expiry·fingerprint·negative-test만 남고 private key·JWT·IAT·NTFY_TOPIC 원문은 남지 않는다
