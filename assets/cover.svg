<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2560" viewBox="0 0 1600 2560" role="img" aria-labelledby="title desc">
  <title id="title">Robotics Math Atlas</title>
  <desc id="desc">행렬 격자와 로봇 관절 궤적을 추상화한 교재 표지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d254f"/>
      <stop offset="0.62" stop-color="#0c657e"/>
      <stop offset="1" stop-color="#087f78"/>
    </linearGradient>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0V96" fill="none" stroke="#ffffff" stroke-opacity=".09" stroke-width="2"/>
      <circle cx="0" cy="0" r="5" fill="#ffffff" fill-opacity=".15"/>
    </pattern>
  </defs>
  <rect width="1600" height="2560" fill="url(#bg)"/>
  <rect width="1600" height="2560" fill="url(#grid)"/>
  <path d="M-80 1840C250 1540 390 2050 710 1700S1190 1360 1680 1530" fill="none" stroke="#ffd784" stroke-width="26" stroke-linecap="round"/>
  <circle cx="325" cy="1770" r="36" fill="#ffd784"/>
  <circle cx="780" cy="1640" r="36" fill="#ffd784"/>
  <circle cx="1250" cy="1470" r="36" fill="#ffd784"/>
  <g fill="#fff">
    <text x="130" y="390" font-family="system-ui,sans-serif" font-size="96" font-weight="750">ROBOTICS</text>
    <text x="130" y="525" font-family="system-ui,sans-serif" font-size="132" font-weight="800">MATH ATLAS</text>
    <text x="136" y="635" font-family="system-ui,sans-serif" font-size="48" opacity=".9">제어 · 추정 · 확률추론을 위한 연결형 수학</text>
    <text x="130" y="2310" font-family="ui-monospace,monospace" font-size="60" opacity=".75">xₜ → yₜ → p(xₜ | y₁:ₜ)</text>
  </g>
</svg>
