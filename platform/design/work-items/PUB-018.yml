  out:
    - GitHub App·Windows broker trust transition 재시도
    - trusted-provenance required 승격
    - 복구를 제외한 workflow·verifier·ruleset·App permission·배포 credential 변경
    - 세 CODEOWNERS 후보와 privileged editorial controller 의존성 변경
    - 임시 모드를 독립된 agent·supervisor 권한 분리로 주장
