<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">베르누이 우도와 로그우도는 같은 최대점을 가진다</title>
  <desc id="desc">성공 7회와 실패 3회라는 교육용 합성 관측에서 왼쪽은 상대우도, 오른쪽은 최대값을 0으로 옮긴 로그우도를 보여 준다. 두 곡선 모두 세타 0.7에서 최대이며, 로그를 취하면 곱셈이 덧셈으로 바뀌지만 최대점은 변하지 않는다.</desc>
  <defs>
    <style>
      .ink{fill:#172033;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif}.muted{fill:#536075;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif}.panel{fill:#fff;stroke:#b9c6d8;stroke-width:2}.grid{stroke:#d7dfeb;stroke-width:1}.axis{stroke:#536075;stroke-width:2}.like{fill:none;stroke:#1459b8;stroke-width:5;stroke-linejoin:round}.loglike{fill:none;stroke:#087f78;stroke-width:5;stroke-linejoin:round;stroke-dasharray:13 7}.peak{fill:#8d2c49;stroke:#681b34;stroke-width:2}.guide{stroke:#8d2c49;stroke-width:2;stroke-dasharray:7 6}.formula{fill:#eef3fb;stroke:#b9c6d8;stroke-width:1.5}
    </style>
  </defs>
  <rect width="1120" height="600" rx="24" fill="#fbfcfe"/>
  <text class="ink" x="40" y="45" font-size="27" font-weight="700">로그는 곱을 합으로 바꾸지만 최대점 θ̂=7/10은 그대로 둔다</text>
  <text class="muted" x="40" y="76" font-size="17">교육용 합성 관측: n=10회 중 성공 S=7회, 실패 3회</text>

  <rect class="panel" x="35" y="100" width="510" height="450" rx="18"/>
  <text class="ink" x="65" y="140" font-size="22" font-weight="700">A · 상대우도 L(θ) / L(θ̂)</text>
  <rect class="formula" x="65" y="157" width="445" height="43" rx="10"/>
  <text class="ink" x="287" y="184" text-anchor="middle" font-size="17">L(θ) = θ⁷(1−θ)³</text>
  <g aria-hidden="true">
    <line class="grid" x1="100" y1="368" x2="500" y2="368"/>
    <line class="grid" x1="100" y1="250" x2="500" y2="250"/>
    <line class="axis" x1="100" y1="485" x2="508" y2="485"/>
    <line class="axis" x1="100" y1="485" x2="100" y2="228"/>
    <polyline class="like" points="108,485 120,485 140,485 160,484.9 180,484.3 200,482.3 220,477.1 240,466.3 260,447.6 280,419.3 300,381.8 320,338.4 340,295.7 360,262.9 380,250 400,264.6 420,307.7 440,370.7 460,434.5 480,475.8 492,484.3"/>
    <line class="guide" x1="380" y1="485" x2="380" y2="250"/>
    <path class="peak" d="M380 240 l10 10 -10 10 -10 -10 z"/>
    <text class="ink" x="391" y="232" font-size="17" font-weight="700">최대점 0.7</text>
    <text class="muted" x="96" y="490" text-anchor="end" font-size="14">0</text>
    <text class="muted" x="96" y="373" text-anchor="end" font-size="14">0.5</text>
    <text class="muted" x="96" y="255" text-anchor="end" font-size="14">1.0</text>
    <text class="muted" x="100" y="509" text-anchor="middle" font-size="14">0</text>
    <text class="muted" x="300" y="509" text-anchor="middle" font-size="14">0.5</text>
    <text class="muted" x="500" y="509" text-anchor="middle" font-size="14">1</text>
    <text class="muted" x="300" y="535" text-anchor="middle" font-size="16">성공확률 후보 θ</text>
    <text class="muted" x="65" y="382" font-size="15" transform="rotate(-90 65 382)">상대우도</text>
  </g>

  <rect class="panel" x="575" y="100" width="510" height="450" rx="18"/>
  <text class="ink" x="605" y="140" font-size="22" font-weight="700">B · 상대 로그우도 ℓ(θ)−ℓ(θ̂)</text>
  <rect class="formula" x="605" y="157" width="445" height="43" rx="10"/>
  <text class="ink" x="827" y="184" text-anchor="middle" font-size="17">ℓ(θ) = 7 log θ + 3 log(1−θ)</text>
  <g aria-hidden="true">
    <line class="grid" x1="640" y1="368" x2="1040" y2="368"/>
    <line class="grid" x1="640" y1="250" x2="1040" y2="250"/>
    <line class="axis" x1="640" y1="485" x2="1048" y2="485"/>
    <line class="axis" x1="640" y1="485" x2="640" y2="228"/>
    <polyline class="loglike" points="648,485 660,470.5 680,401.7 700,362.5 720,335.6 740,315.5 760,299.8 780,287.2 800,277 820,268.7 840,262.1 860,256.9 880,253.2 900,250.8 920,250 940,250.9 960,254.1 980,260.6 1000,272.6 1020,297.6 1032,334.7"/>
    <line class="guide" x1="920" y1="485" x2="920" y2="250"/>
    <path class="peak" d="M920 240 l10 10 -10 10 -10 -10 z"/>
    <text class="ink" x="929" y="232" font-size="17" font-weight="700">같은 최대점 0.7</text>
    <text class="muted" x="636" y="255" text-anchor="end" font-size="14">0</text>
    <text class="muted" x="636" y="373" text-anchor="end" font-size="14">−8</text>
    <text class="muted" x="636" y="490" text-anchor="end" font-size="14">−16</text>
    <text class="muted" x="640" y="509" text-anchor="middle" font-size="14">0</text>
    <text class="muted" x="840" y="509" text-anchor="middle" font-size="14">0.5</text>
    <text class="muted" x="1040" y="509" text-anchor="middle" font-size="14">1</text>
    <text class="muted" x="840" y="535" text-anchor="middle" font-size="16">성공확률 후보 θ</text>
    <text class="muted" x="605" y="395" font-size="15" transform="rotate(-90 605 395)">최대값에서의 차이</text>
  </g>

  <text class="muted" x="560" y="579" text-anchor="middle" font-size="16">로그는 양의 구간에서 단조증가하므로 후보의 순서와 argmax를 보존한다. 경계 θ=0,1은 별도로 확인한다.</text>
</svg>
