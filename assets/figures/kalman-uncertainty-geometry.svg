<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
  <title id="title">예측 불확실성과 측정 불확실성이 사후 추정으로 겹치는 과정</title>
  <desc id="desc">왼쪽에는 넓은 예측 공분산 타원, 가운데에는 측정이 허용하는 세로 띠, 오른쪽에는 두 정보가 겹쳐 작아진 사후 공분산 타원이 있다.</desc>
  <defs>
    <style>
      .ink{fill:#172033;font-family:'Noto Sans KR',sans-serif}.muted{fill:#5b6578;font-family:'Noto Sans KR',sans-serif}
      .axis{stroke:#93a1b7;stroke-width:2}.prior{fill:#e8f1ff;stroke:#1459b8;stroke-width:4}.measure{fill:#fff2d6;stroke:#955000;stroke-width:3;stroke-dasharray:9 7}.post{fill:#dcf7f2;stroke:#087f78;stroke-width:4}.arrow{stroke:#34415a;stroke-width:3;fill:none;marker-end:url(#head)}
    </style>
    <marker id="head" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#34415a"/></marker>
  </defs>
  <rect width="980" height="470" rx="24" fill="#fbfcfe"/>
  <text class="ink" x="40" y="48" font-size="26" font-weight="700">불확실성이 겹치는 곳으로 평균이 이동하고 타원이 작아진다</text>
  <g transform="translate(55 90)">
    <line class="axis" x1="20" y1="300" x2="250" y2="300"/><line class="axis" x1="20" y1="300" x2="20" y2="35"/>
    <ellipse class="prior" cx="140" cy="172" rx="94" ry="56" transform="rotate(-24 140 172)"/>
    <circle cx="140" cy="172" r="6" fill="#1459b8"/>
    <text class="ink" x="58" y="340" font-size="20" font-weight="700">사전 예측</text>
    <text class="muted" x="58" y="369" font-size="16">넓은 P⁻: 모델이 확실하지 않음</text>
  </g>
  <path class="arrow" d="M315 235 H365"/>
  <g transform="translate(375 90)">
    <line class="axis" x1="20" y1="300" x2="250" y2="300"/><line class="axis" x1="20" y1="300" x2="20" y2="35"/>
    <rect class="measure" x="135" y="45" width="50" height="235" rx="18"/>
    <line x1="160" y1="45" x2="160" y2="280" stroke="#955000" stroke-width="4"/>
    <text class="ink" x="70" y="340" font-size="20" font-weight="700">센서 측정</text>
    <text class="muted" x="54" y="369" font-size="16">좁은 R: 가로 위치를 잘 앎</text>
  </g>
  <path class="arrow" d="M635 235 H685"/>
  <g transform="translate(695 90)">
    <line class="axis" x1="20" y1="300" x2="250" y2="300"/><line class="axis" x1="20" y1="300" x2="20" y2="35"/>
    <rect x="126" y="45" width="50" height="235" rx="18" fill="#fff2d6" opacity="0.55"/>
    <ellipse class="post" cx="151" cy="168" rx="38" ry="67" transform="rotate(-8 151 168)"/>
    <circle cx="151" cy="168" r="6" fill="#087f78"/>
    <text class="ink" x="73" y="340" font-size="20" font-weight="700">사후 추정</text>
    <text class="muted" x="47" y="369" font-size="16">작은 P⁺: 두 정보의 교집합</text>
  </g>
</svg>
