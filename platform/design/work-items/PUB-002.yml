scope:
  in:
    - 모든 same-repo·fork PR에서 test와 lint 실행
    - build와 deploy job·권한 분리
    - main deploy의 required quality 의존
    - rename·대량 migration 동안 scheduled editorial digest를 멈추는 명시적 freeze switch
    - editorial source push와 issue 처리 완료 표시의 2단계 확정
    - lockfile·Action commit·다운로드 checksum 고정
    - PR live Pages preview를 immutable Actions review artifact로 보안 전환
    - privileged digest는 default-branch trigger·controller만 사용하고 공개 제안은 평문 본문만 자동 반영
  out:
    - 시각 회귀와 PDF·EPUB full matrix
    - 기존 build command 의미 변경
change_paths:
  read:
    - Makefile
    - .github/workflows/publish-web.yml
    - .github/workflows/editorial-digest.yml
    - scripts/verify_outputs.py
  write:
    - Makefile
    - .github/workflows/**
    - scripts/bootstrap-tools.sh
    - platform/editorial-runtime/**
    - platform/scripts/editorial.py
    - platform/editorial/README.md
    - platform/tests/test_editorial.py
    - platform/tests/test_workflow_contract.py
    - platform/design/work-items/PUB-001.yml
    - platform/design/work-items/PUB-002.yml
    - platform/design/work-items/PUB-005.yml
    - CLAUDE.md
    - EDITING_SYSTEM_PLAN.md
    - EDITING_UX_RESEARCH.md
  exclusive_locks: [ci-control-plane]
  generated: []
verification:
  source_contract:
    - make test
    - make lint
    - make workflow-lint
    - .tools/uv/uv run --locked pytest platform/tests/test_editorial.py platform/tests/test_workflow_contract.py
    - git status --porcelain --untracked-files=all 출력 없음
  rendered_contract:
    - same-repo draft PR의 quality와 build 결과
    - fork 조건을 모사해 quality는 실행되고 deploy만 제한되는지 확인
  post_merge:
    - main deploy가 quality와 build 성공 뒤에만 실행됨
    - required check 설정 증거 기록
    - freeze switch가 새 editorial batch 생성을 막고 해제 후 정상 복귀함
    - editorial/batch는 GitHub Actions bot 외 직접 push가 ruleset으로 제한됨
rollback:
  triggers:
    - 정상 PR이 quality job 자체 오류로 실행되지 않음
    - deploy가 검증보다 먼저 실행되거나 write 권한이 quality에 노출됨
  unit: merge_commit
  steps:
    - workflow merge commit을 revert한다
    - 기존 metadata·link·output 검사는 끄지 않는다
  compatibility_preserved:
    - 기존 make target 이름과 로컬 동작 유지
    - reader root와 지속 교정용 /review/ URL 유지
definition_of_done:
  - 모든 PR에 read-only test·lint check가 존재한다
  - deploy credential은 deploy job에만 있다
  - editorial digest를 repository setting으로 안전하게 동결·해제할 수 있다
  - editorial issue는 source push와 batch PR 보장 전에는 bridged로 표시되지 않는다
  - CI dependency resolution은 tracked lockfile을 변경하지 못한다
  - PR review는 Pages write credential 없이 immutable artifact로 제공된다
  - branch ruleset에 required check를 지정할 수 있다
  - dispatch 직전 verified local SHA와 live editorial/batch ref가 일치한다
  - front matter·코드·수식·HTML·shortcode·저장소 밖 경로 제안은 자동 반영되지 않는다
