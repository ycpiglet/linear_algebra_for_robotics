# Phase 0 배포 파이프라인 (EDITING_SYSTEM_PLAN.md §4 Phase 0)
#
# - main 푸시: 독자용 웹(_site)을 gh-pages 루트에, 교정용 리뷰 빌드(_review,
#   Hypothesis 주석 활성)를 /review/ 경로에 배포한다.
# - PR: 읽기 전용 검증과 리뷰 빌드 artifact만 만든다. PR workflow에는 배포 토큰이 없다.
# - main: 같은 읽기 전용 build artifact를 만든 뒤 trusted deploy-pages workflow가 배포한다.
#
# 최초 1회 수동 설정: 저장소 Settings → Pages → Source: "Deploy from a branch"
# → Branch: gh-pages / (root). 이 워크플로우가 첫 실행에서 gh-pages 브랜치를 만든다.
name: publish-web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-web-${{ github.event_name }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: source-contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pinned toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tools
          key: tools-${{ runner.os }}-${{ hashFiles('scripts/bootstrap-tools.sh') }}

      - name: Cache Python environment
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .venv
            ~/.local/share/uv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Test source contracts
        run: make test

      - name: Lint Python and Actions workflows
        run: make lint

      - name: Check pull request whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Check push whitespace
        if: github.event_name == 'push'
        run: git diff --check "${{ github.event.before }}...${{ github.sha }}"

      - name: Verify quality tools left a clean workspace
        run: test -z "$(git status --porcelain --untracked-files=all)"

  build:
    name: publication-build
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 90
    steps:
      # 전체 이력 필요: pre-render의 pagehistory.py가 페이지별 git log를 굽는다.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache pinned toolchain (quarto/typst/uv)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .tools
          key: tools-${{ runner.os }}-${{ hashFiles('scripts/bootstrap-tools.sh') }}

      - name: Cache Python environment
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .venv
            ~/.local/share/uv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Cache Quarto freeze and Jupyter cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            _freeze
            .quarto
            courseware/labs/.jupyter_cache
          key: freeze-${{ github.run_id }}
          restore-keys: |
            freeze-

      - name: Build reader site (web profile)
        if: github.event_name == 'push'
        run: make web

      - name: Build review site (web+review profiles, Hypothesis enabled)
        run: make review

      - name: Assemble deployment root (reader + /review)
        if: github.event_name == 'push'
        run: |
          mkdir -p public/review
          cp -a _site/. public/
          cp -a _review/. public/review/
          printf '%s\n' "${{ github.sha }}" > public/source-commit.txt

      - name: Upload immutable main Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-main-${{ github.run_id }}
          path: public
          if-no-files-found: error
          retention-days: 3

      - name: Upload immutable PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-pr-${{ github.event.number }}-${{ github.run_id }}
          path: _review
          if-no-files-found: error
          retention-days: 3

      - name: Upload immutable dispatched review artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pages-dispatch-${{ github.run_id }}
          path: _review
          if-no-files-found: error
          retention-days: 3
