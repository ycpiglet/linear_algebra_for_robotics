<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 580" role="img" aria-labelledby="title desc">
  <title id="title">2R 로봇팔에서 자코비안 두 열이 말단속도로 합쳐지는 과정</title>
  <desc id="desc">왼쪽에는 첫째 관절 30도, 둘째 관절 60도인 2R 팔과 말단에서 시작하는 첫째 및 둘째 자코비안 열이 있다. 오른쪽에는 관절속도 0.5와 마이너스 0.2가 두 열을 가중하고, 두 성분의 벡터 합이 말단속도 마이너스 0.19, 0.1732 미터 매 초가 되는 과정이 있다.</desc>
  <defs>
    <style>
      .ink{fill:#172033;font-family:'Noto Sans KR',sans-serif}.muted{fill:#5b6578;font-family:'Noto Sans KR',sans-serif}.panel{fill:#fff;stroke:#d7dfeb;stroke-width:2}.axis{stroke:#93a1b7;stroke-width:2}.link{stroke:#34415a;stroke-width:17;stroke-linecap:round}.joint{fill:#fff;stroke:#34415a;stroke-width:6}.base{fill:#34415a}.j1{stroke:#a92f49;stroke-width:5;fill:none;marker-end:url(#redHead)}.j2{stroke:#1459b8;stroke-width:5;fill:none;marker-end:url(#blueHead)}.net{stroke:#087f78;stroke-width:6;fill:none;marker-end:url(#tealHead)}.guide{stroke:#93a1b7;stroke-width:2;stroke-dasharray:7 6;fill:none}.arc{stroke:#6740ad;stroke-width:3;fill:none;marker-end:url(#violetHead)}
    </style>
    <marker id="redHead" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto"><path d="M0,0 L14,6 L0,12 Z" fill="#a92f49"/></marker>
    <marker id="blueHead" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto"><path d="M0,0 L14,6 L0,12 Z" fill="#1459b8"/></marker>
    <marker id="tealHead" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto"><path d="M0,0 L14,6 L0,12 Z" fill="#087f78"/></marker>
    <marker id="violetHead" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#6740ad"/></marker>
  </defs>
  <rect width="1120" height="580" rx="24" fill="#fbfcfe"/>
  <text class="ink" x="38" y="45" font-size="26" font-weight="700">자코비안의 열은 관절 하나의 순간 효과이고, 말단속도는 그 가중합이다</text>

  <g transform="translate(30 78)">
    <rect class="panel" width="540" height="460" rx="18"/>
    <text class="ink" x="24" y="38" font-size="20" font-weight="700">A · 현재 자세와 두 열</text>
    <line class="axis" x1="90" y1="390" x2="500" y2="390"/>
    <line class="axis" x1="120" y1="420" x2="120" y2="62"/>
    <text class="muted" x="493" y="414" font-size="15">x</text><text class="muted" x="96" y="70" font-size="15">y</text>
    <path class="base" d="M82 414 H158 L148 390 H92 Z"/>
    <line class="link" x1="120" y1="390" x2="328" y2="270"/>
    <line class="link" x1="328" y1="270" x2="328" y2="125"/>
    <circle class="joint" cx="120" cy="390" r="13"/><circle class="joint" cx="328" cy="270" r="13"/><circle class="joint" cx="328" cy="125" r="12"/>
    <path class="arc" d="M174 390 A54 54 0 0 0 167 363"/><text class="ink" x="174" y="363" font-size="16" font-weight="700">q₁=30°</text>
    <path class="arc" d="M370 246 A48 48 0 0 0 328 222"/><text class="ink" x="377" y="226" font-size="16" font-weight="700">q₂=60°</text>
    <path class="j1" d="M328 125 L238 63"/><text class="ink" x="34" y="79" font-size="16" font-weight="700">j₁=(-0.500, 0.346)</text>
    <path class="j2" d="M328 125 L248 125"/><text class="ink" x="344" y="133" font-size="16" font-weight="700">j₂=(-0.300, 0)</text>
    <rect x="24" y="426" width="492" height="1" fill="#d7dfeb"/>
    <text class="muted" x="24" y="450" font-size="15">빨강 j₁: 관절 1만 1 rad/s · 파랑 j₂: 관절 2만 1 rad/s</text>
  </g>

  <g transform="translate(590 78)">
    <rect class="panel" width="500" height="460" rx="18"/>
    <text class="ink" x="24" y="38" font-size="20" font-weight="700">B · q̇의 두 성분을 가중해 더하기</text>
    <rect x="24" y="58" width="202" height="42" rx="21" fill="#ffe8ed"/><text class="ink" x="43" y="85" font-size="17" font-weight="700">q̇₁=0.5 rad/s</text>
    <rect x="238" y="58" width="224" height="42" rx="21" fill="#e8f1ff"/><text class="ink" x="256" y="85" font-size="17" font-weight="700">q̇₂=-0.2 rad/s</text>
    <line class="axis" x1="70" y1="380" x2="465" y2="380"/><line class="axis" x1="420" y1="412" x2="420" y2="130"/>
    <circle cx="420" cy="380" r="5" fill="#34415a"/>
    <path class="j1" d="M420 380 L280 283"/><text class="ink" x="205" y="267" font-size="16" font-weight="700">0.5 j₁</text>
    <path class="j2" d="M280 283 L322 283"/><text class="ink" x="274" y="315" font-size="16" font-weight="700">-0.2 j₂</text>
    <path class="guide" d="M420 380 L462 380 L322 283"/>
    <path class="net" d="M420 380 L322 283"/><text class="ink" x="170" y="356" font-size="17" font-weight="700">ṗ=(-0.190, 0.173) m/s</text>
    <text class="muted" x="24" y="432" font-size="16">ṗ = j₁q̇₁ + j₂q̇₂ = J(q)q̇</text>
  </g>
</svg>
