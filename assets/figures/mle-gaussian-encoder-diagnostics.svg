<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">가우스 잔차에서 최소제곱, 엔코더 적합, 이상치 진단, 곡률까지 이어지는 과정</title>
  <desc id="desc">네 개의 교육용 합성 패널이다. A는 잔차의 가우스 우도에 음의 로그를 취하면 잔차 제곱 벌점이 되는 관계를 보인다. B는 엔코더 보정의 합성 점과 한 이상치, 이상치가 없을 때와 있을 때의 적합선을 비교한다. C는 잔차 줄기 그림에서 한 큰 이상치의 제곱 기여가 큰 모습을 보인다. D는 최대점이 같아도 날카로운 로그우도와 평평한 로그우도의 곡률이 달라 국소 불확실성이 달라지는 모습을 보인다.</desc>
  <defs>
    <style>
      .ink{fill:#172033;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif}.muted{fill:#536075;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif}.panel{fill:#fff;stroke:#b9c6d8;stroke-width:2}.grid{stroke:#d7dfeb;stroke-width:1}.axis{stroke:#536075;stroke-width:2}.gauss{fill:none;stroke:#1459b8;stroke-width:5}.penalty{fill:none;stroke:#8d2c49;stroke-width:5;stroke-dasharray:12 7}.clean-fit{fill:none;stroke:#087f78;stroke-width:5}.outlier-fit{fill:none;stroke:#a24f00;stroke-width:5;stroke-dasharray:12 7}.normal{fill:#fff;stroke:#1459b8;stroke-width:3}.outlier{fill:#8d2c49;stroke:#681b34;stroke-width:2}.stem{stroke:#1459b8;stroke-width:3}.stem-outlier{stroke:#8d2c49;stroke-width:5}.zero{stroke:#536075;stroke-width:2;stroke-dasharray:7 6}.sharp{fill:none;stroke:#1459b8;stroke-width:5}.flat{fill:none;stroke:#a24f00;stroke-width:5;stroke-dasharray:12 7}.guide{stroke:#7a8699;stroke-width:2;stroke-dasharray:6 5}.formula{fill:#eef3fb;stroke:#b9c6d8;stroke-width:1.5}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#536075"/>
    </marker>
  </defs>
  <rect width="1280" height="900" rx="24" fill="#fbfcfe"/>
  <text class="ink" x="40" y="44" font-size="27" font-weight="700">잔차를 확률로 모델링하면 목적함수·진단·불확실성이 한 줄로 연결된다</text>
  <text class="muted" x="40" y="74" font-size="17">모든 점과 곡선은 개념 설명을 위한 교육용 합성 예시이며 실제 센서 성능 측정값이 아니다.</text>

  <rect class="panel" x="35" y="98" width="595" height="350" rx="18"/>
  <text class="ink" x="63" y="137" font-size="21" font-weight="700">A · 가우스 잔차 → 음의 로그 → 제곱손실</text>
  <rect class="formula" x="63" y="153" width="536" height="42" rx="10"/>
  <text class="ink" x="331" y="180" text-anchor="middle" font-size="17">p(r|θ) ∝ exp(−r²/2σ²)   ⇒   −log p = 상수 + r²/2σ²</text>
  <g aria-hidden="true">
    <line class="axis" x1="78" y1="381" x2="285" y2="381"/>
    <line class="axis" x1="181" y1="381" x2="181" y2="218"/>
    <path class="gauss" d="M82 378 C112 376 128 350 145 297 C157 254 168 233 181 230 C194 233 205 254 217 297 C234 350 250 376 280 378"/>
    <line class="guide" x1="181" y1="230" x2="181" y2="381"/>
    <text class="muted" x="181" y="407" text-anchor="middle" font-size="15">잔차 r=0</text>
    <text class="muted" x="87" y="218" font-size="15">높은 우도</text>
    <text class="muted" x="78" y="300" font-size="14" transform="rotate(-90 78 300)">p(r|θ)</text>
    <line x1="298" y1="300" x2="347" y2="300" stroke="#536075" stroke-width="3" marker-end="url(#arrow)"/>
    <text class="ink" x="322" y="284" text-anchor="middle" font-size="16" font-weight="700">−log</text>
    <line class="axis" x1="365" y1="381" x2="590" y2="381"/>
    <line class="axis" x1="477" y1="381" x2="477" y2="218"/>
    <path class="penalty" d="M370 225 Q477 510 585 225"/>
    <circle cx="477" cy="381" r="7" fill="#fff" stroke="#8d2c49" stroke-width="3"/>
    <text class="muted" x="477" y="407" text-anchor="middle" font-size="15">잔차 r=0</text>
    <text class="muted" x="497" y="240" font-size="15">|r|가 크면 큰 벌점</text>
    <text class="muted" x="365" y="305" font-size="14" transform="rotate(-90 365 305)">음의 로그우도</text>
  </g>
  <text class="ink" x="331" y="430" text-anchor="middle" font-size="16" font-weight="700">독립·동분산·가우스라는 조건 아래에서만 합이 최소제곱이 된다</text>

  <rect class="panel" x="650" y="98" width="595" height="350" rx="18"/>
  <text class="ink" x="678" y="137" font-size="21" font-weight="700">B · 엔코더 적합: 한 이상치가 제곱손실을 끈다</text>
  <g aria-hidden="true">
    <line class="grid" x1="710" y1="270" x2="1200" y2="270"/>
    <line class="grid" x1="710" y1="345" x2="1200" y2="345"/>
    <line class="axis" x1="710" y1="405" x2="1205" y2="405"/>
    <line class="axis" x1="710" y1="405" x2="710" y2="175"/>
    <path class="clean-fit" d="M735 382 L1175 205"/>
    <path class="outlier-fit" d="M735 402 L1175 186"/>
    <circle class="normal" cx="755" cy="373" r="7"/><circle class="normal" cx="820" cy="345" r="7"/><circle class="normal" cx="885" cy="318" r="7"/><circle class="normal" cx="950" cy="290" r="7"/><circle class="normal" cx="1015" cy="266" r="7"/><circle class="normal" cx="1080" cy="233" r="7"/><circle class="normal" cx="1145" cy="214" r="7"/>
    <path class="outlier" d="M1080 157 l11 11 -11 11 -11 -11 z"/>
    <line class="guide" x1="1080" y1="179" x2="1080" y2="233"/>
    <text class="ink" x="1097" y="164" font-size="15" font-weight="700">합성 이상치</text>
    <line class="clean-fit" x1="735" y1="422" x2="775" y2="422"/>
    <text class="muted" x="783" y="428" font-size="14">이상치 제외 적합</text>
    <line class="outlier-fit" x1="925" y1="422" x2="965" y2="422"/>
    <text class="muted" x="973" y="428" font-size="14">이상치 포함 적합</text>
    <text class="muted" x="955" y="395" text-anchor="middle" font-size="15">기준 관절각 q (rad)</text>
    <text class="muted" x="675" y="315" font-size="14" transform="rotate(-90 675 315)">엔코더 출력 z (rad)</text>
  </g>

  <rect class="panel" x="35" y="470" width="595" height="350" rx="18"/>
  <text class="ink" x="63" y="509" font-size="21" font-weight="700">C · 잔차 그림: 큰 점 하나의 제곱 기여를 찾는다</text>
  <g aria-hidden="true">
    <line class="grid" x1="85" y1="590" x2="595" y2="590"/>
    <line class="zero" x1="85" y1="668" x2="595" y2="668"/>
    <line class="grid" x1="85" y1="746" x2="595" y2="746"/>
    <line class="axis" x1="85" y1="770" x2="605" y2="770"/>
    <line class="axis" x1="85" y1="770" x2="85" y2="550"/>
    <line class="stem" x1="135" y1="668" x2="135" y2="660"/><circle class="normal" cx="135" cy="660" r="6"/>
    <line class="stem" x1="200" y1="668" x2="200" y2="676"/><circle class="normal" cx="200" cy="676" r="6"/>
    <line class="stem" x1="265" y1="668" x2="265" y2="663"/><circle class="normal" cx="265" cy="663" r="6"/>
    <line class="stem" x1="330" y1="668" x2="330" y2="680"/><circle class="normal" cx="330" cy="680" r="6"/>
    <line class="stem" x1="395" y1="668" x2="395" y2="657"/><circle class="normal" cx="395" cy="657" r="6"/>
    <line class="stem" x1="460" y1="668" x2="460" y2="672"/><circle class="normal" cx="460" cy="672" r="6"/>
    <line class="stem-outlier" x1="525" y1="668" x2="525" y2="574"/><path class="outlier" d="M525 563 l11 11 -11 11 -11 -11 z"/>
    <text class="ink" x="433" y="561" font-size="16" font-weight="700">이 한 점의 r²가 목적함수를 지배</text>
    <line class="guide" x1="500" y1="567" x2="475" y2="585" marker-end="url(#arrow)"/>
    <text class="muted" x="340" y="797" text-anchor="middle" font-size="15">기준 관절각 q (rad)</text>
    <text class="muted" x="55" y="680" font-size="14" transform="rotate(-90 55 680)">적합 잔차 r (rad)</text>
    <text class="muted" x="92" y="663" font-size="14">0</text>
  </g>

  <rect class="panel" x="650" y="470" width="595" height="350" rx="18"/>
  <text class="ink" x="678" y="509" font-size="21" font-weight="700">D · 같은 최대점, 다른 곡률: 불확실성이 다르다</text>
  <g aria-hidden="true">
    <line class="axis" x1="710" y1="770" x2="1205" y2="770"/>
    <line class="axis" x1="710" y1="770" x2="710" y2="545"/>
    <path class="flat" d="M735 688 C815 670 860 566 947 566 C1034 566 1080 670 1170 688"/>
    <path class="sharp" d="M805 755 C870 748 892 566 947 566 C1002 566 1024 748 1090 755"/>
    <line class="guide" x1="947" y1="566" x2="947" y2="770"/>
    <path class="outlier" d="M947 555 l11 11 -11 11 -11 -11 z"/>
    <line x1="885" y1="625" x2="1009" y2="625" stroke="#1459b8" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="800" y1="665" x2="1094" y2="665" stroke="#a24f00" stroke-width="3" stroke-dasharray="10 6" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text class="ink" x="1018" y="612" font-size="15" font-weight="700">큰 관측정보 J: 좁음</text>
    <text class="ink" x="1018" y="650" font-size="15" font-weight="700">작은 J: 넓음</text>
    <text class="muted" x="947" y="797" text-anchor="middle" font-size="15">모수 θ</text>
    <text class="muted" x="681" y="690" font-size="14" transform="rotate(-90 681 690)">로그우도 ℓ(θ)</text>
    <text class="ink" x="918" y="558" text-anchor="end" font-size="15" font-weight="700">같은 최대점 θ̂</text>
  </g>

  <text class="muted" x="640" y="860" text-anchor="middle" font-size="16">그림의 선·점 위치는 원리를 보여 주기 위한 합성값이다. 실제 엔코더 보정에는 장치별 단위·온도·시간동기·반복 측정을 기록한다.</text>
</svg>
