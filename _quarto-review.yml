# 리뷰(교정) 빌드 프로필 — 반드시 web 프로필과 함께, review를 앞에 두고 사용한다:
#   quarto render --profile review,web
# (Quarto는 먼저 나열된 프로필의 스칼라 값이 우선한다 — web이 앞이면
#  이 파일의 output-dir이 무시되어 리뷰 빌드가 _site를 덮어쓴다)
# 웹 프로필 위에 다음 델타만 얹는다:
#   1. 출력 디렉터리를 _review로 분리 (독자용 _site와 절대 섞지 않는다)
#   2. Hypothesis 주석 레이어 활성화 (편집팀 교정 전용 — 독자 배포판에는 없음)
#   3. 드래그한 문장의 텍스트 프래그먼트 링크 복사 스크립트 추가
project:
  output-dir: _review

website:
  comments:
    hypothesis:
      theme: clean
      openSidebar: false

format:
  html:
    include-after-body:
      - assets/includes/atlas-scripts.html
      - assets/includes/review-scripts.html
