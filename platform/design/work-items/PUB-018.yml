verification:
  source_contract:
    - design backlog check와 schema tests
    - make test
    - make lint
    - git diff --check
    - 기존 source-contract·publication-build required 설정 불변 확인
    - main ruleset이 approval 0·CODEOWNER false·last-push false·merge-only로 복구됨
    - agent branch·trailer·label과 exact-head merge 계약의 문서 일치 확인
  rendered_contract: []
  post_merge:
    - Actions enabled와 EDITORIAL_FREEZE false 재확인
    - PR #25 closed와 transition branch·evidence 보존 확인
    - PUB-003·PUB-006·PUB-007이 PUB-017 없이 시작 가능한 의존 그래프 확인
rollback:
  triggers:
    - control-plane 동결 범위가 의도치 않게 해제됨
    - trusted-provenance를 권한 분리 없이 required로 승격함
    - 기존 source-contract·publication-build를 제거하거나 약화함
  unit: merge_commit
  steps:
    - publication fallback merge commit을 revert한다
    - PUB-017 보류 상태와 기존 required checks를 유지한다
  compatibility_preserved:
    - 콘텐츠·공개 URL·Git history를 바꾸지 않는다
    - PR #25와 기존 transition evidence를 삭제하거나 재사용하지 않는다
definition_of_done:
  - PUB-017과 PUB-019만 control-plane trust 작업으로 격리된다
  - 비-PUB-017 작업이 검증 가능한 의존 그래프에서 시작 가능하다
  - 임시 모드의 보장하지 않는 사항과 재개 조건이 문서화된다
  - 통제면·외부 cutover는 별도 사용자 확인 없이는 실행하지 않는 경계가 문서화된다
  - Actions와 editorial automation이 전환 전 정상 운영값으로 복구된다
  - App permission을 현재 credential로 확인하지 못한 사실과 재사용 전 owner 확인 조건이 residual risk로 남는다
