scope:
  in:
    - PR·main push·workflow_dispatch의 새 agent 커밋과 main integration merge에서 Actor trailer 검증
    - main first-parent integration 단위와 dispatch 전체 branch range의 fail-closed 검증
    - 앞선 main 위반이 다음 정상 push에서 사라지지 않는 trusted-through sticky 검증
    - PR 변경 코드와 분리되고 PR 객체를 Git data로만 읽는 base-side provenance status publisher
    - GITHUB_TOKEN 자동 PR 이벤트 억제를 보완하는 default-branch repository_dispatch 검증 경로
    - YAML anchor·alias 해석에 의존하지 않는 bootstrap 이후 workflow·CODEOWNERS·privileged controller 동결
    - editorial dispatch가 전달한 exact trusted main SHA와 branch 전체 범위 검증
    - literal escape와 본문 속 유사 문자열을 trailer로 오인하지 않는 회귀 test
    - PUB-002의 기존 비정규 trailer 커밋을 역사적 예외로 기록하고 새 위반만 차단
  out:
    - 보호된 기존 Git history 재작성
    - 사람 커밋에 Actor trailer 강제
    - supervisor 신원 인증과 trusted-provenance ruleset required context 활성화
