title: Windows-first cross-platform local development toolchain
area: ci
status: in_progress
priority: P0
change_class: toolchain
version_impact: compatible
owner_role: release-engineer
review_roles: [publishing-ops-steward]
branch: agent/cross-platform-dev
dependencies: [PUB-005, PUB-006, PUB-018]
decision_refs:
  - README.md
  - platform/design/work-items/PUB-018.yml
  - platform/design/work-items/PUB-019.yml
