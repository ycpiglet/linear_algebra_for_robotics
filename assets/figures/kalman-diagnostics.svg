<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 520" role="img" aria-labelledby="title desc">
  <title id="title">혁신 로그에서 정상 조정, 작은 과정 잡음, 결측·이상치·지연을 구별하는 정적 진단</title>
  <desc id="desc">세 패널이 있다. 정상 패널의 혁신은 0 주변 허용띠 안에서 오간다. 과정 잡음을 너무 작게 둔 패널은 기동 구간에 같은 부호의 큰 혁신이 이어진다. 자료 품질 패널은 결측 구간의 공분산 증가, 이상치 한 점, 지연된 측정을 따로 표시한다.</desc>
  <defs>
    <style>
      .ink{fill:#172033;font-family:'Noto Sans KR',sans-serif}.muted{fill:#5b6578;font-family:'Noto Sans KR',sans-serif}.axis{stroke:#5b6578;stroke-width:2}.zero{stroke:#93a1b7;stroke-width:2;stroke-dasharray:6 5}.ok{stroke:#1459b8;stroke-width:4;fill:none}.bad{stroke:#a92f49;stroke-width:4;fill:none}.unc{fill:#dcf7f2;stroke:#087f78;stroke-width:2}.drop{fill:#f1eaff;opacity:.8}.delay{stroke:#955000;stroke-width:3;stroke-dasharray:7 5}.point{fill:#a92f49}
    </style>
  </defs>
  <rect width="1140" height="520" rx="24" fill="#fbfcfe"/>
  <text class="ink" x="38" y="45" font-size="26" font-weight="700">오차가 커졌다는 사실보다 ‘언제, 어떤 모양으로’ 커졌는지가 원인을 가른다</text>

  <g transform="translate(45 92)">
    <text class="ink" x="0" y="0" font-size="19" font-weight="700">A · 일관된 혁신</text>
    <g transform="translate(0 30)">
      <rect x="0" y="70" width="310" height="130" rx="12" fill="#e1f5e9"/>
      <line class="zero" x1="0" y1="135" x2="310" y2="135"/>
      <line class="axis" x1="0" y1="270" x2="320" y2="270"/><line class="axis" x1="0" y1="270" x2="0" y2="0"/>
      <polyline class="ok" points="0,139 25,104 50,159 75,123 100,179 125,130 150,91 175,147 200,112 225,170 250,132 275,100 310,151"/>
      <text class="muted" x="77" y="305" font-size="15">시간 t · 평균은 0 부근</text>
      <text class="muted" x="18" y="58" font-size="14">모형이 예측한 허용띠</text>
    </g>
  </g>

  <g transform="translate(415 92)">
    <text class="ink" x="0" y="0" font-size="19" font-weight="700">B · Q를 너무 작게 둔 기동</text>
    <g transform="translate(0 30)">
      <rect x="0" y="70" width="310" height="130" rx="12" fill="#e1f5e9"/>
      <line class="zero" x1="0" y1="135" x2="310" y2="135"/>
      <line class="axis" x1="0" y1="270" x2="320" y2="270"/><line class="axis" x1="0" y1="270" x2="0" y2="0"/>
      <rect x="118" y="0" width="115" height="270" rx="8" fill="#ffe8ed" opacity=".55"/>
      <polyline class="bad" points="0,145 25,118 50,157 75,126 100,147 125,92 150,48 175,29 200,42 225,77 250,106 275,125 310,142"/>
      <text class="ink" x="136" y="250" font-size="14" font-weight="700">가속 기동</text>
      <text class="muted" x="43" y="305" font-size="15">같은 부호의 큰 혁신이 연속</text>
    </g>
  </g>

  <g transform="translate(785 92)">
    <text class="ink" x="0" y="0" font-size="19" font-weight="700">C · 결측, 이상치, 지연</text>
    <g transform="translate(0 30)">
      <line class="axis" x1="0" y1="270" x2="320" y2="270"/><line class="axis" x1="0" y1="270" x2="0" y2="0"/>
      <rect class="drop" x="56" y="0" width="84" height="270" rx="8"/>
      <path class="unc" d="M0 145 C55 137 75 110 140 86 C190 113 250 126 310 134 L310 160 C250 151 190 145 140 184 C75 169 55 157 0 155 Z"/>
      <line class="zero" x1="0" y1="148" x2="310" y2="148"/>
      <circle class="point" cx="191" cy="38" r="8"/>
      <line class="delay" x1="256" y1="69" x2="256" y2="222"/>
      <text class="ink" x="70" y="28" font-size="14" font-weight="700">결측</text>
      <text class="ink" x="162" y="25" font-size="14" font-weight="700">이상치</text>
      <text class="ink" x="230" y="58" font-size="14" font-weight="700">지연 도착</text>
      <text class="muted" x="11" y="305" font-size="15">결측 중 P↑ · 사건별 처리가 필요</text>
    </g>
  </g>
</svg>
