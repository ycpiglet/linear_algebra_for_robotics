  <title id="jacobian-2r-geometry-title">2R 평면팔의 기하 정의</title>
  <desc id="jacobian-2r-geometry-desc">기준좌표계 0의 원점에서 길이 0.4미터인 링크 1이 관절각 30도로 뻗어 관절 2에 닿고, 길이 0.3미터인 링크 2가 링크 1에 대한 상대각 60도로 이어져 말단 p에 닿는다. 관절각 q1은 x축에서, q2는 링크 1의 연장선에서 잰다.</desc>
