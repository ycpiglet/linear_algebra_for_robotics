<style>
  /* 리뷰 빌드 전용 UI. 독자 배포판(_site)에는 포함되지 않는다. */
  .review-toolbar {
    position: absolute;
    z-index: 1090;
    display: flex;
    gap: 0.35rem;
  }
  .review-toolbar button,
  .review-dialog button {
    padding: 0.25rem 0.6rem;
    border: 1px solid var(--bs-border-color, #adb5bd);

  .review-links {
    position: fixed;

    bottom: 1rem;
    z-index: 1080;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    align-items: flex-end;
  }
  /* 독서 도구막대(atlas.js reader-tools)와 같은 우하단을 쓴다 —
     도구막대가 있으면 그 위로 비켜서고, 접힘 상태면 조금만 올라간다. */

    bottom: calc(10.5rem + env(safe-area-inset-bottom, 0px));
  }
  body.atlas-reader-active.atlas-reader-collapsed .review-links {
    bottom: calc(4.6rem + env(safe-area-inset-bottom, 0px));

  .review-links a {
    display: inline-flex;
    min-height: 2.45rem;
    align-items: center;
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--bs-border-color, #adb5bd);
    border-radius: 999px;
    background: var(--bs-body-bg, #fff);
    color: var(--bs-body-color, #212529);
    font-size: 0.82rem;
    font-weight: 650;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  }
  .review-history {
    margin-top: 2.5rem;
    padding: 0.7rem 0.9rem;
    border: 1px dashed var(--bs-border-color, #adb5bd);
    border-radius: 0.5rem;
    font-size: 0.82rem;
  }
  .review-history h2 {
    margin: 0 0 0.4rem;
    font-size: 0.85rem;
  }
  .review-history ul {
    margin: 0;
    padding-left: 1.1rem;
  }
  /* Quarto 다크 모드: 테마 토글이 body.quarto-dark를 붙인다.
     --bs-* 변수가 토글에 따라 갱신되지 않아 명시적 다크 팔레트로 덮는다. */
  body.quarto-dark .review-toolbar button,
  body.quarto-dark .review-dialog,
  body.quarto-dark .review-dialog button,
  body.quarto-dark .review-dialog textarea,
  body.quarto-dark .review-links a {
    background: #212529;
    color: #dee2e6;
    border-color: #495057;
  }
  body.quarto-dark .review-dialog blockquote,
  body.quarto-dark .review-history {

    color: inherit;
  }
  body.quarto-dark .review-dialog-backdrop {
    background: rgba(0, 0, 0, 0.6);

</style>
<script>
(function reviewTools() {
  'use strict';
  if (window.__REVIEW_SCRIPTS_LOADED__) return;
  window.__REVIEW_SCRIPTS_LOADED__ = true;

  // 수정 제안 이슈가 생성될 저장소 (Phase 1-3 브리지가 이 이슈를 수거한다).
  const REPO = 'ycpiglet/linear_algebra_for_robotics';
  const ISSUE_LABEL = 'editorial';

  let toolbar = null;
  let hideTimer = null;
  let selectionInfo = null;

  // ---------- 앵커·문맥 추출 ----------

  function blockOf(node) {
    const el = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
    return el ? el.closest('p, li, blockquote, div.sourceCode, table') : null;
  }

  function anchorIdOf(block) {
    if (!block) return null;
    if (/^p-[0-9a-f]{8}/.test(block.id)) return block.id;
    const span = block.querySelector(':scope > span.paragraph-anchor');
    if (span && span.id) return span.id;
    const inherited = block.closest('[id^="p-"]');
    return inherited ? inherited.id : null;
  }

  function contextOf(block, quote) {
    if (!block) return { prefix: '', suffix: '' };
    const full = block.textContent.replace(/\s+/g, ' ');
    const clean = quote.replace(/\s+/g, ' ').trim();
    const index = full.indexOf(clean);
    if (index < 0) return { prefix: '', suffix: '' };
    return {
      prefix: full.slice(Math.max(0, index - 30), index).trim(),
      suffix: full.slice(index + clean.length, index + clean.length + 30).trim(),
    };
  }

  // 텍스트 프래그먼트(#:~:text=)용 인코딩: 구분자로 쓰이는 '-'까지 이스케이프한다.
  const enc = (s) => encodeURIComponent(s).replace(/-/g, '%2D');

  function fragmentFor(text) {
    const clean = text.replace(/\s+/g, ' ').trim();
    if (!clean) return '';
    if (clean.length <= 120) return ':~:text=' + enc(clean);
    const head = clean.slice(0, 60).replace(/\s+\S*$/, '');
    const tail = clean.slice(-60).replace(/^\S*\s+/, '');
    return ':~:text=' + enc(head) + ',' + enc(tail);
  }

  function quoteLink(info) {
    // 문단 앵커가 있으면 요소 ID + 텍스트 프래그먼트를 겹쳐 쓴다 —
    // 본문이 바뀌어 텍스트 매칭이 실패해도 문단 위치로는 도달한다.
    const base = window.location.href.split('#')[0];
    return base + '#' + (info.anchorId || '') + fragmentFor(info.quote);
  }

  // ---------- 선택 툴바 ----------

  function removeToolbar() {
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    if (toolbar) { toolbar.remove(); toolbar = null; }
  }

  function makeButton(label, onClick) {
    const button = document.createElement('button');
    button.type = 'button';
    button.textContent = label;
    button.addEventListener('click', onClick);
    return button;
  }

  function showToolbar(rect, info) {
    removeToolbar();
    toolbar = document.createElement('div');
    toolbar.className = 'review-toolbar';
    toolbar.style.left = window.scrollX + rect.left + 'px';
    toolbar.style.top = window.scrollY + rect.bottom + 6 + 'px';

    const copyButton = makeButton('이 문장 링크 복사', async () => {
      const url = quoteLink(info);
      try {
        await navigator.clipboard.writeText(url);
        copyButton.textContent = '복사됨 ✓';
      } catch (error) {
        copyButton.textContent = '복사 실패';
        window.prompt('아래 링크를 복사하세요:', url);
      }
      hideTimer = setTimeout(removeToolbar, 1500);
    });

    toolbar.appendChild(copyButton);
    toolbar.appendChild(makeButton('수정 제안', () => {
      removeToolbar();
      openDialog(info);
    }));
    document.body.appendChild(toolbar);
  }

  function onSelectionSettled() {
    const selection = window.getSelection();
    if (!selection || selection.isCollapsed || selection.rangeCount === 0) {
      removeToolbar();
      return;
    }
    const quote = selection.toString();
    if (!quote || !quote.trim()) { removeToolbar(); return; }
    const range = selection.getRangeAt(0);
    const container = range.commonAncestorContainer;
    const host = container.nodeType === Node.ELEMENT_NODE ? container : container.parentElement;
    if (!host || !host.closest('main')) { removeToolbar(); return; }

    const block = blockOf(range.startContainer);
    const context = contextOf(block, quote);
    selectionInfo = {
      quote: quote.replace(/\s+/g, ' ').trim(),
      anchorId: anchorIdOf(block),
      prefix: context.prefix,
      suffix: context.suffix,
      isCode: !!(block && block.matches('div.sourceCode')),
    };
    showToolbar(range.getBoundingClientRect(), selectionInfo);
  }

  // ---------- 수정 제안 다이얼로그 ----------

  let dialog = null;
  let backdrop = null;
  let lastFocused = null;

  function closeDialog() {
    if (dialog) { dialog.remove(); dialog = null; }
    if (backdrop) { backdrop.remove(); backdrop = null; }
    if (lastFocused && lastFocused.focus) lastFocused.focus();
    lastFocused = null;
  }

  const clip = (s, n) => (s.length > n ? s.slice(0, n) + '…' : s);
  // GitHub 이슈 프리필 URL의 실질 한도는 ~8KB — 초과하면 414이거나 본문이 잘린다.
  const URL_BUDGET = 7500;

  function issueUrl(info, suggestion, comment) {
    const pageUrl = window.location.href.split('#')[0];
    const pageTitle = document.title.replace(/\s*[–—-]\s*[^–—-]*$/, '').trim() || document.title;

    const build = (quoteMax, textMax, clipped) => {
      const quote = clip(info.quote, quoteMax);
      const sections = [];
      if (comment.trim()) sections.push('## 사유·코멘트\n\n' + clip(comment.trim(), textMax));
      if (suggestion.trim() && suggestion.trim() !== info.quote) {
        sections.push('## 수정안\n\n~~~\n' + clip(suggestion.trim(), textMax) + '\n~~~');
      }
      sections.push('## 원문\n\n> ' + quote);
      if (clipped) {
        sections.push('> ⚠ 길이 제한으로 축약된 내용입니다. 전체 원문은 아래 문단 앵커와 페이지 링크로 확인하세요.');
      }
      sections.push([
        '## 위치',
        '',
        '- 페이지: ' + pageUrl,
        '- 문단: `' + (info.anchorId || '(앵커 없음)') + '`',
      ].join('\n'));
      sections.push('<!-- editorial-anchor ' + JSON.stringify({
        v: 1,
        page: pageUrl,
        paragraph: info.anchorId || null,
        quote: quote,
        prefix: clip(info.prefix, 60),
        suffix: clip(info.suffix, 60),
      }) + ' -->');

      const title = '[교정] ' + clip(info.quote, 40) + ' (' + clip(pageTitle, 30) + ')';
      return 'https://github.com/' + REPO + '/issues/new'
        + '?title=' + encodeURIComponent(title)
        + '&labels=' + encodeURIComponent(ISSUE_LABEL)
        + '&body=' + encodeURIComponent(sections.join('\n\n'));
    };

    // 한도 안에 들 때까지 단계적으로 줄인다. 한글은 인코딩 시 글자당 9바이트로
    // 불어나므로(%EC%88%98…) 마지막 단계는 아주 짧게 잡는다.
    const tiers = [[600, 1500, false], [300, 800, true], [120, 400, true],
                   [80, 150, true], [60, 60, true]];
    let url = '';
    for (const [quoteMax, textMax, clipped] of tiers) {
      url = build(quoteMax, textMax, clipped);
      if (url.length <= URL_BUDGET) return url;
    }
    return url;
  }

  function openDialog(info) {
    closeDialog();
    lastFocused = document.activeElement;

    backdrop = document.createElement('div');
    backdrop.className = 'review-dialog-backdrop';
    backdrop.addEventListener('click', closeDialog);

    dialog = document.createElement('div');
    dialog.className = 'review-dialog';
    dialog.setAttribute('role', 'dialog');
    dialog.setAttribute('aria-modal', 'true');
    dialog.setAttribute('aria-labelledby', 'review-dialog-title');

    const heading = document.createElement('h2');
    heading.id = 'review-dialog-title';
    heading.textContent = '수정 제안';

    const quoteLabel = document.createElement('label');
    quoteLabel.textContent = '원문';
    const quoteView = document.createElement('blockquote');
    quoteView.textContent = info.quote;

    const suggestionLabel = document.createElement('label');
    suggestionLabel.textContent = '수정안 (그대로 두면 코멘트만 제출)';
    suggestionLabel.htmlFor = 'review-suggestion';
    const suggestionInput = document.createElement('textarea');
    suggestionInput.id = 'review-suggestion';
    suggestionInput.value = info.quote;

    const commentLabel = document.createElement('label');
    commentLabel.textContent = '사유·코멘트';
    commentLabel.htmlFor = 'review-comment';
    const commentInput = document.createElement('textarea');
    commentInput.id = 'review-comment';

    const note = document.createElement('p');
    note.className = 'review-anchor-note';
    let noteText = 'GitHub 이슈 작성 화면이 미리 채워져 열립니다. 내용 확인 후 제출하세요. 문단 앵커: '
      + (info.anchorId || '없음(텍스트 인용으로만 추적)');
    if (info.quote.length > 600) {
      noteText += ' · ⚠ 선택이 깁니다 — 이슈에는 앞부분만 인용되고 전체 위치는 앵커로 추적됩니다.';
    }
    if (info.isCode) {
      noteText += ' · 코드 블록 제안은 자동 반영되지 않고 사람 검토로 전달됩니다.';
    }
    note.textContent = noteText;

    const actions = document.createElement('div');
    actions.className = 'review-dialog-actions';
    actions.appendChild(makeButton('취소', closeDialog));
    actions.appendChild(makeButton('GitHub 이슈로 제출', () => {
      window.open(issueUrl(info, suggestionInput.value, commentInput.value), '_blank', 'noopener');
      closeDialog();
    }));

    dialog.append(heading, quoteLabel, quoteView, suggestionLabel, suggestionInput,
      commentLabel, commentInput, note, actions);
    // 포커스 트랩: Tab이 다이얼로그 밖 본문으로 탈출하지 않게 순환시킨다.
    dialog.addEventListener('keydown', (event) => {
      if (event.key !== 'Tab') return;
      const focusables = dialog.querySelectorAll('textarea, button');
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && document.activeElement === last) {
        event.preventDefault();
        first.focus();
      }
    });
    document.body.appendChild(backdrop);
    document.body.appendChild(dialog);
    suggestionInput.focus();
  }

  // ---------- 편집 데스크·페이지 편집 링크와 최근 변경 (리뷰 빌드 전용) ----------

  function siteRoot() {
    return window.__ROBOTICS_MATH_ATLAS_ROOT__ || new URL('./', document.baseURI).href;
  }

  // 현재 페이지의 .qmd 소스 경로 (사이트 루트 기준). 브리지의 page_to_source와 동일 규칙.
  function pageSourcePath() {
    const rootPath = new URL(siteRoot()).pathname;
    let relative = window.location.pathname;
    if (relative.startsWith(rootPath)) relative = relative.slice(rootPath.length);
    if (relative === '' || relative.endsWith('/')) relative += 'index.html';
    if (!relative.endsWith('.html')) return null;
    return relative.slice(0, -'.html'.length) + '.qmd';
  }

  function addReviewChrome() {
    const source = pageSourcePath();
    const links = document.createElement('nav');
    links.className = 'review-links';
    links.setAttribute('aria-label', '편집 도구');

    if (!/\/editorial-desk\.html$/.test(window.location.pathname)) {
      const desk = document.createElement('a');
      desk.href = new URL('editorial-desk.html', siteRoot()).href;
      desk.textContent = '편집 데스크';
      links.appendChild(desk);
    }
    if (source && source !== 'editorial-desk.qmd') {
      const edit = document.createElement('a');
      edit.href = 'https://github.dev/' + REPO + '/blob/main/' + source;
      edit.target = '_blank';
      edit.rel = 'noopener';
      edit.textContent = '이 페이지 고치기';
      links.appendChild(edit);
    }
    if (links.children.length) document.body.appendChild(links);
    if (source) addPageHistory(source);
  }

  async function addPageHistory(source) {
    const main = document.querySelector('main');
    if (!main) return;
    let entries;
    try {
      const response = await fetch(new URL('platform/generated/page-history.json', siteRoot()).href);
      if (!response.ok) return;
      entries = (await response.json())[source];
    } catch (error) {
      return;
    }
    if (!entries || !entries.length) return;
    const box = document.createElement('section');
    box.className = 'review-history';
    const heading = document.createElement('h2');
    heading.textContent = '최근 변경';
    const list = document.createElement('ul');
    for (const entry of entries) {
      const item = document.createElement('li');
      const link = document.createElement('a');
      link.href = 'https://github.com/' + REPO + '/commit/' + entry.sha;
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = entry.subject;
      item.append(entry.date + ' · ' + entry.author + ' — ');
      item.appendChild(link);
      list.appendChild(item);
    }
    const all = document.createElement('p');
    all.style.margin = '0.4rem 0 0';
    const allLink = document.createElement('a');
    allLink.href = 'https://github.com/' + REPO + '/commits/main/' + source;
    allLink.target = '_blank';
    allLink.rel = 'noopener';
    allLink.textContent = '이 페이지의 전체 이력 →';
    all.appendChild(allLink);
    box.append(heading, list, all);
    main.appendChild(box);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', addReviewChrome);
  } else {
    addReviewChrome();
  }

  // ---------- 이벤트 배선 ----------

  document.addEventListener('mouseup', (event) => {
    if (dialog || (toolbar && toolbar.contains(event.target))) return;
    setTimeout(onSelectionSettled, 0);
  });
  // 터치 기기(모바일·태블릿)는 길게 눌러 선택해도 mouseup이 오지 않는다 —
  // selectionchange를 디바운스해서 손가락 선택에도 툴바가 뜨게 한다.
  let selectionDebounce = null;
  document.addEventListener('selectionchange', () => {
    if (dialog) return;
    clearTimeout(selectionDebounce);
    selectionDebounce = setTimeout(() => {
      if (dialog) return;
      if (toolbar && toolbar.contains(document.activeElement)) return;
      onSelectionSettled();
    }, 350);
  });
  document.addEventListener('keyup', (event) => {
    if (event.key === 'Escape') {
      if (dialog) { closeDialog(); return; }
      removeToolbar();
      return;
    }
    if (dialog) return;
    if (event.shiftKey || event.key === 'Shift') setTimeout(onSelectionSettled, 0);
  });
  window.addEventListener('scroll', () => { if (!dialog) removeToolbar(); }, { passive: true });
})();
</script>
