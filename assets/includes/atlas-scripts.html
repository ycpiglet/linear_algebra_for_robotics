<script>
(function loadAtlasInterface() {
  const resources = Array.from(document.querySelectorAll('link[href], script[src]'));
  const siteLibrary = resources
    .map((element) => element.href || element.src)
    .find((url) => url && url.includes('/site_libs/'));
  const fallback = new URL('./', document.baseURI).href;
  const siteRoot = siteLibrary ? siteLibrary.split('/site_libs/')[0] + '/' : fallback;
  window.__ROBOTICS_MATH_ATLAS_ROOT__ = siteRoot;

  const script = document.createElement('script');
  script.src = new URL('assets/js/atlas.js', siteRoot).href;
  script.defer = true;
  document.head.appendChild(script);
})();
</script>
